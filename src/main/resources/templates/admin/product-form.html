<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{/shared/layout :: view(~{::title}, ~{::main})}">

<head>
    <title th:text="${product.id == null ? 'Thêm sản phẩm' : 'Cập nhật sản phẩm'}"></title>
</head>

<main class="main-content">
    <div class="form-container">
        <h2 class="form-title" th:text="${product.id == null ? 'THÊM MỚI GAME' : 'CẬP NHẬT GAME'}"></h2>

        <form th:action="@{/admin/products/save}" th:object="${product}" method="post" enctype="multipart/form-data" class="product-form">
            <input type="hidden" th:field="*{id}" />

            <div class="form-flex">
                <div class="form-column-left">
                    <div class="image-preview-box">
                        <img th:src="${product.image != null ? '/images/products/' + product.image : '/images/no-image.png'}" 
                             id="output" alt="Preview"/>
                    </div>
                    <div class="file-input-wrapper">
                        <label for="image-upload" class="btn-upload">Chọn ảnh sản phẩm</label>
                        <input type="file" name="imageFile" id="image-upload" onchange="loadFile(event)" accept="image/*" />
                    </div>
                    <input type="hidden" th:field="*{image}" />
                </div>

                <div class="form-column-right">
                    <div class="form-group">
                        <label>Tên Game</label>
                        <input type="text" th:field="*{name}" placeholder="Nhập tên game..." required />
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Giá bán (VNĐ)</label>
                            <input type="number" th:field="*{price}" step="1000" required />
                        </div>
                        <div class="form-group">
                            <label>Số lượng kho</label>
                            <input type="number" th:field="*{quantity}" required />
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Danh mục</label>
                            <select th:field="*{category.id}">
                                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                            </select>
                        </div>
                        <div class="form-group" style="flex: 0.5;">
                            <label>Trạng thái</label>
                            <div class="toggle-box">
                                <input type="checkbox" th:field="*{available}" id="available" />
                                <label for="available">Kinh doanh</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Mô tả chi tiết</label>
                        <textarea th:field="*{description}" rows="5" placeholder="Nhập mô tả cho game..."></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-save">Lưu sản phẩm</button>
                        <a th:href="@{/admin/products}" class="btn-cancel">Hủy bỏ</a>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <script>
        var loadFile = function(event) {
            var output = document.getElementById('output');
            output.src = URL.createObjectURL(event.target.files[0]);
            output.onload = function() {
                URL.revokeObjectURL(output.src)
            }
        };
    </script>
</main>
</html>
