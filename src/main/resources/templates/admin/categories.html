<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{/shared/layout :: view(~{::title}, ~{::main})}">

<head>
    <title th:text="#{admin.category.manage}"></title>
</head>
<main class="main-content">
    <div class="admin-container" style="max-width: 800px; margin: 20px auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 class="admin-title" style="margin: 0;" th:text="#{admin.category.manage}"></h2>
            <a th:href="@{/admin/categories/create}" class="btn-save" style="text-decoration: none;">
                + <span th:text="#{admin.category.add}"></span>
            </a>
        </div>

        <table class="admin-table">
            <thead>
                <tr>
                    <th style="width: 80px; text-align: center;">ID</th>
                    <th th:text="#{admin.category.name}">Tên danh mục</th>
                    <th style="width: 200px; text-align: center;" th:text="#{admin.category.action}">Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${categories}">
                    <td th:text="${c.id}" style="text-align: center; font-weight: bold; color: #666;"></td>
                    <td th:text="${c.name}" style="font-weight: 500; font-size: 16px;"></td>
                    <td style="text-align: center;">
                        <a th:href="@{|/admin/categories/edit/${c.id}|}" 
                           style="color: #007bff; text-decoration: none; font-weight: 500;">
                           <i class="icon-edit"></i> Sửa
                        </a>
                        <span style="color: #ddd; margin: 0 10px;"> | </span>
                        <a th:href="@{|/admin/categories/delete/${c.id}|}" 
                           th:onclick="|return confirm('#{admin.category.confirm}')|" 
                           style="color: #dc3545; text-decoration: none; font-weight: 500;">
                           Xóa
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <div th:if="${#lists.isEmpty(categories)}" style="text-align: center; padding: 30px; color: #999;">
            Chưa có danh mục nào được tạo.
        </div>
    </div>
</main>
</html>
