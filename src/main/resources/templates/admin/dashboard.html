<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{/shared/layout :: view(~{::title}, ~{::main})}">

<head>
    <title th:text="#{admin.dashboard.title}"></title>
</head>

<main class="admin-dashboard">

    <h2 th:text="#{admin.dashboard.heading}"></h2>

    <div class="dashboard-grid">

        <div class="dashboard-card">
            <h3>📦 <span th:text="#{admin.dashboard.product}"></span></h3>
            <p th:text="${productCount}"></p>
        </div>

        <div class="dashboard-card">
            <h3>🧾 <span th:text="#{admin.dashboard.order}"></span></h3>
            <p th:text="${orderCount}"></p>
        </div>

        <div class="dashboard-card">
            <h3>👤 <span th:text="#{admin.dashboard.account}"></span></h3>
            <p th:text="${accountCount}"></p>
        </div>

        <div class="dashboard-card">
            <h3>💰 <span th:text="#{admin.dashboard.revenue}"></span></h3>
            <p>
                <span th:text="${#numbers.formatDecimal(revenue,0,'COMMA',0,'POINT')}"></span> $
            </p>
        </div>

    </div>

    <hr>

    <div class="admin-menu">
        <a th:href="@{/admin/products}" th:text="#{admin.menu.products}"></a>
        <a th:href="@{/admin/categories}" th:text="#{admin.menu.categories}"></a>
        <a th:href="@{/admin/orders}" th:text="#{admin.menu.orders}"></a>
        <a th:href="@{/admin/accounts}" th:text="#{admin.menu.accounts}"></a>
    </div>

</main>
</html>
